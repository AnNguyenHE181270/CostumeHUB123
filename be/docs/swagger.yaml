openapi: 3.0.0

info:
  title: CostumeHUB API
  version: 1.0.0
  description: API documentation for CostumeHUB backend

servers:
  - url: http://localhost:9999/api

tags:
  - name: Users
    description: User authentication & profile management APIs

paths:
  /users/register:
    post:
      summary: Register new user
      description: |
        Register a new user and send OTP to email.
        If the email already exists with pending status, user information and OTP will be updated.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
              properties:
                fullName:
                  type: string
                  example: Nguyen Van A
                email:
                  type: string
                  format: email
                  example: test@gmail.com
                phone:
                  type: string
                  example: "0987654321"
                password:
                  type: string
                  example: "123456"
                gender:
                  type: string
                  enum:
                    - male
                    - female
                    - other
                  example: male
                dateOfBirth:
                  type: string
                  format: date
                  example: "2003-01-01"
      responses:
        "201":
          description: Register successfully and OTP sent to email
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Register successfully. Check your email for OTP.
                  type:
                    type: string
                    example: new
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        example: 665f1a8b2c3d4e5f67890123
                      fullName:
                        type: string
                        example: Nguyen Van A
                      email:
                        type: string
                        example: test@gmail.com
                      phone:
                        type: string
                        example: "0987654321"
                  remainingTime:
                    type: number
                    example: 600000
                    description: OTP expiration time in milliseconds
                  nextResendIn:
                    type: number
                    example: 60000
                    description: Resend OTP cooldown time in milliseconds
        "403":
          description: Account is suspended or banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer role not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Register failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/verify-otp/{email}:
    post:
      summary: Verify OTP
      description: Verify user email using OTP code.
      tags:
        - Users
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
            format: email
          example: test@gmail.com
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - otp
              properties:
                otp:
                  type: string
                  example: ABC123
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Email verified successfully.
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        example: 665f1a8b2c3d4e5f67890123
                      fullName:
                        type: string
                        example: Nguyen Van A
                      email:
                        type: string
                        example: test@gmail.com
                      phone:
                        type: string
                        example: "0987654321"
                      status:
                        type: string
                        example: active
        "400":
          description: Invalid OTP, expired OTP, already verified, or invalid account status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account is suspended or banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Email verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/login:
    post:
      summary: Local email/password login
      description: Authenticate a user with email and password to receive a JWT access token.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: test@gmail.com
                password:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful.
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "400":
          description: Account registered with Google or invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Incorrect password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/forgot-password:
    post:
      summary: Request password reset link
      description: Send a password reset link to user's email if they forgot their password.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: test@gmail.com
      responses:
        "200":
          description: Password reset email sent or standard message (for security)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: If an account with this email exists, password reset instructions have been sent.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/reset-password/{token}:
    post:
      summary: Reset password using token
      description: Update user's password with a valid, non-expired reset token.
      tags:
        - Users
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          example: a1b2c3d4e5f6g7h8...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  example: "newpassword123"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password reset successful.
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/my-profile:
    get:
      summary: Get user profile
      description: Retrieve profile info for the currently logged-in user (requires JWT token).
      tags:
        - Users
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Profile details retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        example: 665f1a8b2c3d4e5f67890123
                      fullName:
                        type: string
                        example: Nguyen Van A
                      email:
                        type: string
                        example: test@gmail.com
                      phone:
                        type: string
                        nullable: true
                        example: "0987654321"
                      gender:
                        type: string
                        nullable: true
                        enum:
                          - male
                          - female
                          - other
                        example: male
                      dateOfBirth:
                        type: string
                        format: date
                        nullable: true
                        example: "2003-01-01"
                      provider:
                        type: string
                        enum:
                          - local
                          - google
                        example: local
                      roles:
                        type: string
                        example: 665f1a8b2c3d4e5f67890123
        "401":
          description: Unauthorized / Token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Error message

    User:
      type: object
      properties:
        id:
          type: string
          example: 665f1a8b2c3d4e5f67890123
        fullName:
          type: string
          example: Nguyen Van A
        email:
          type: string
          example: test@gmail.com
        phone:
          type: string
          nullable: true
          example: "0987654321"
        avatar:
          type: string
          example: "https://cdn-icons-png.flaticon.com/512/149/149071.png"
        gender:
          type: string
          nullable: true
          enum:
            - male
            - female
            - other
          example: male
        dateOfBirth:
          type: string
          format: date
          nullable: true
          example: "2003-01-01"
        provider:
          type: string
          enum:
            - local
            - google
          example: local
        status:
          type: string
          enum:
            - active
            - blocked
            - pending
          example: active
  /users/get-users:
    get:
      summary: Get all users
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A list of users
  /users/update-user/{id}:
    put:
      summary: Update a user
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
                fullName:
                  type: string
                phone:
                  type: string
      responses:
        "200":
          description: User updated successfully
  /users/user/{id}:
    get:
      summary: Get user by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
  /users/roles:
    get:
      summary: Get all roles
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A list of roles

  /categories:
    get:
      summary: Get all categories
      tags:
        - Categories
      responses:
        "200":
          description: A list of categories
    post:
      summary: Create a category
      tags:
        - Categories
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Category created

  /categories/{id}:
    put:
      summary: Update a category
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Category updated

  /categories/{id}/toggle:
    put:
      summary: Toggle category status
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category toggled

  /costumes:
    get:
      summary: Get all costumes
      tags:
        - Costumes
      responses:
        "200":
          description: A list of costumes
    post:
      summary: Create a costume
      tags:
        - Costumes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Costume created

  /costumes/{id}:
    get:
      summary: Get costume by ID
      tags:
        - Costumes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Costume details
    put:
      summary: Update a costume
      tags:
        - Costumes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Costume updated
    delete:
      summary: Delete a costume
      tags:
        - Costumes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Costume deleted
